# yaml-language-server: $schema=https://json.schemastore.org/github-issue-form.json
name: Feature request
description: Propose a detector, API change, or documentation improvement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Check [docs/specs.md](https://github.com/ViniciusPuerto/race_guard/blob/main/docs/specs.md) for planned work. Overlaps with an epic or task? Link it.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to catch or make easier?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: APIs, config knobs, or behavior you have in mind.
    validations:
      required: true
  - type: textarea
    id: false_positives
    attributes:
      label: False positive / performance notes
      description: How should this stay quiet when it is not a real race, and what overhead is acceptable?
  - type: checkboxes
    id: terms
    attributes:
      label: Project fit
      options:
        - label: I have read the principles in the README and [CONTRIBUTING](https://github.com/ViniciusPuerto/race_guard/blob/main/CONTRIBUTING.md) (framework-agnostic core, safe-by-default, low false positives).
