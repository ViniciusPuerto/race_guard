# yaml-language-server: $schema=https://json.schemastore.org/github-issue-form.json
name: Bug report
description: Something is broken or behaves unexpectedly.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please search [existing issues](https://github.com/ViniciusPuerto/race_guard/issues) first.
        For **security** problems, do not file a public issue. See the [security policy](https://github.com/ViniciusPuerto/race_guard/blob/main/SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in a sentence or two.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions that matter.
      value: |
        - race_guard version:
        - Ruby version:
        - Rails (if any) version:
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code, configuration (`RaceGuard.configure` block if relevant), and steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
