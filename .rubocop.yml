AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "docs/**/*"
    - "examples/**/*"

Layout/LineLength:
  Max: 100

Style/Documentation:
  Enabled: false

Gemspec/DevelopmentDependencies:
  # Standard gem pattern: list dev tools in the gemspec.
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*.rb"
    - "script/**/*.rb"

Metrics/AbcSize:
  Exclude:
    - "script/**/*.rb"

Metrics/CyclomaticComplexity:
  Exclude:
    - "script/**/*.rb"

Metrics/ParameterLists:
  Exclude:
    - "lib/race_guard/event.rb"

Metrics/ClassLength:
  Exclude:
    - "lib/race_guard/configuration.rb"

Metrics/MethodLength:
  Max: 12
  Exclude:
    - "script/**/*.rb"
