AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "docs/**/*"

Layout/LineLength:
  Max: 100

Style/Documentation:
  Enabled: false

Gemspec/DevelopmentDependencies:
  # Standard gem pattern: list dev tools in the gemspec.
  Enabled: false
